services:

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: sns,sqs
      DEBUG: "0"

  locust:
    image: locustio/locust:2.20.1
    profiles: ["load"]
    ports:
      - "8089:8089"
    volumes:
      - .:/mnt/locust
    command: >
      -f /mnt/locust/locustfile.py
      --host http://order-service:8080
    depends_on:
      order-service:
        condition: service_healthy
